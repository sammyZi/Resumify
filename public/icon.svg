<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <!-- Backdrop gradient: deep slate → teal -->
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0F2A3F"/>
      <stop offset="100%" stop-color="#13505B"/>
    </linearGradient>
    <!-- Page gradient: soft warm white -->
    <linearGradient id="page" x1="16" y1="8" x2="48" y2="56" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#EAF2F1"/>
    </linearGradient>
    <!-- Accent gradient: gold -->
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F4C77B"/>
      <stop offset="100%" stop-color="#E0A85B"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="64" height="64" rx="15" fill="url(#bg)"/>

  <!-- Page / document body with subtle shadow -->
  <g filter="url(#shadow)">
    <rect x="16" y="9" width="32" height="42" rx="3.5" fill="url(#page)"/>
  </g>

  <!-- Avatar circle (photo placeholder) -->
  <circle cx="26" cy="20" r="5" fill="#13505B"/>

  <!-- Name + title lines beside avatar -->
  <rect x="33" y="17" width="10" height="2.4" rx="1.2" fill="#13505B"/>
  <rect x="33" y="22" width="7"  height="2"   rx="1"   fill="#9DB8B6"/>

  <!-- Gold accent divider -->
  <rect x="21" y="30" width="22" height="2" rx="1" fill="url(#accent)"/>

  <!-- Content rows -->
  <rect x="21" y="35.5" width="22" height="1.8" rx="0.9" fill="#C2D2D0"/>
  <rect x="21" y="39.5" width="22" height="1.8" rx="0.9" fill="#C2D2D0"/>
  <rect x="21" y="43.5" width="15" height="1.8" rx="0.9" fill="#C2D2D0"/>

  <!-- Gold check seal — bottom-right, signals 'polished / approved' -->
  <circle cx="45" cy="46" r="7" fill="url(#accent)"/>
  <path d="M42 46 l2.2 2.2 L48.5 43.5" stroke="#0F2A3F" stroke-width="1.8"
        stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
